<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Zakupy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ekran powitalny: pytamy o imię tylko raz, zapisujemy w localStorage -->
  <div id="welcome" class="welcome hidden">
    <div class="welcome-card">
      <p class="eyebrow">zanim zaczniemy</p>
      <h1>Kto robi zakupy?</h1>
      <p class="welcome-sub">Żeby było widać, kto co dodał na wspólną listę.</p>
      <div class="welcome-choice">
        <button type="button" class="user-btn" data-user="Grzegorz">Grzegorz</button>
        <button type="button" class="user-btn" data-user="Ola">Ola</button>
      </div>
    </div>
  </div>

  <div id="app" class="app hidden">

    <div id="offline-banner" class="offline-banner hidden">Brak internetu — zmiany zapiszą się i wyślą po odzyskaniu połączenia</div>

    <header class="topbar">
      <div class="topbar-inner">
        <div class="topbar-row">
          <button type="button" id="back-btn" class="icon-btn hidden" aria-label="Wstecz">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
          </button>
          <div class="topbar-title">
            <p class="eyebrow" id="view-eyebrow">wspólna lista</p>
            <h1 id="view-title">Zakupy</h1>
          </div>
          <div class="topbar-actions">
            <button type="button" id="search-btn" class="icon-btn" aria-label="Szukaj">
              <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            </button>
            <button type="button" id="menu-btn" class="icon-btn" aria-label="Menu">
              <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h16M4 17h16"/></svg>
            </button>
          </div>
        </div>
      </div>
    </header>

    <main class="main" id="view"></main>

    <nav class="bottom-nav" id="bottom-nav">
      <button type="button" class="nav-btn active" data-route="home">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h14V10"/></svg>
        <span>Listy</span>
      </button>
      <button type="button" class="nav-btn" data-route="templates">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 9h8M8 13h5"/></svg>
        <span>Szablony</span>
      </button>
    </nav>

    <div id="toast-stack" class="toast-stack"></div>
    <div id="modal-root"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
